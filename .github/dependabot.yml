version: 2
updates:
  # Top-level Astro site
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 5
    versioning-strategy: increase
    labels:
      - dependencies
    groups:
      astro:
        patterns:
          - "astro"
          - "@astrojs/*"
    ignore:
      # @astrojs/cloudflare 13.x requires astro ^6.3.0 as a peer dep.
      # Until this project is upgraded to Astro 6, Dependabot must stay
      # on the 12.x line — otherwise `npm ci` hard-fails with ERESOLVE
      # and Cloudflare Pages can't build. Remove this entry as part of
      # the Astro 5 -> 6 upgrade.
      - dependency-name: "@astrojs/cloudflare"
        update-types: ["version-update:semver-major"]

  # Cloudflare Worker (Instagram media proxy)
  - package-ecosystem: npm
    directory: "/worker"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - worker

  # GitHub Actions (none today, but enables auto-PRs the moment a workflow is added)
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - dependencies
      - ci
